<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coninfra Machinery - Contact Pages</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #B8282E 0%, #8B1F24 100%);
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
        }
        
        h1 {
            color: #B8282E;
            margin-bottom: 10px;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        a {
            display: block;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-saumil {
            background: #B8282E;
            color: white;
        }
        
        .btn-saumil:hover {
            background: #8B1F24;
            transform: scale(1.05);
        }
        
        .btn-hardik {
            background: #666;
            color: white;
        }
        
        .btn-hardik:hover {
            background: #333;
            transform: scale(1.05);
        }
        
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏭 CONINFRA MACHINERY</h1>
        <p>Select Contact Person</p>
        
        <div class="button-group">
            <!-- ✅ FIXED: Changed from saumil_shah_mobile.html to saumil_shah_landing.html -->
            <a href="saumil_shah_landing.html" class="btn-saumil">
                👤 Saumil Shah - Managing Director
            </a>
            
            <!-- ✅ FIXED: Changed from hardik_patel_mobile.html to hardik_patel_landing.html -->
            <a href="hardik_patel_landing.html" class="btn-hardik">
                👤 Hardik Patel - Director - Business Development
            </a>
        </div>
        
        <div class="footer">
            <p>Select above to view contact details</p>
        </div>
    </div>
</body>
</html>
